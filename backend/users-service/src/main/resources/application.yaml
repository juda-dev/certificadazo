server:
  port: ${PORT:0}

spring:
  application:
    name: users-service

  datasource:
    url: ${DB_URL:jdbc:mysql://users-certificadazo:3300/certificadazo?createDatabaseIfNotExist=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:judadev}
  jpa:
    hibernate:
      ddl-auto: update

  cloud:
    function:
      definition: handleReplies

    stream:
      bindings:
        commands-out-0:
          destination: users-events
          content-type: application/json
        replies-in-0:
          destination: keycloak-replies
          content-type: application/json
          group: users-service

      kafka:
        binder:
          brokers: ${KAFKA_URI:localhost:9092}
          
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://eureka-server:8761/eureka}
