server:
  port: ${PORT:0}

spring:
  application:
    name: ai-service

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

  cloud:
    function:
      definition: handleReplies

    stream:
      bindings:
        commands-out-0:
          destination: templates-events
          content-type: application/json
        handleReplies-in-0:
          destination: templates-replies
          content-type: application/json
          group: ai-service

      kafka:
        binder:
          brokers: ${KAFKA_URI:localhost:9092}

  ai:
    deepseek:
      api-key: ${DEEPSEEK_API_KEY}
      chat:
        model: ${DEEP_SEEK_MODEL:deepseek-v4-pro}
        temperature: 0.0
        max-tokens: 10240

    chat:
      client:
        enabled: false

qwen:
  api-key: ${QWEN_API_KEY}
  base-url: ${QWEN_BASE_URL:https://ws-vwimqjxrathdcsc2.ap-southeast-1.maas.aliyuncs.com/compatible-mode/v1}
  model: ${QWEN_MODEL:qwen3.7-plus}
  temperature: 0.0
  max-tokens: 20480

app:
  storage:
    location: ./uploads
